name: Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BACKEND_URL: https://trendhunter-backend-production.up.railway.app
      FRONTEND_URL: https://trendhunter-frontend-production.up.railway.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for production services
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$BACKEND_URL/health" >/dev/null \
              && curl -fsS "$BACKEND_URL/api/v1/trends" >/dev/null \
              && curl -fsS "$FRONTEND_URL" >/dev/null; then
              echo "Production services are ready"
              exit 0
            fi
            echo "Waiting for Railway services... attempt $attempt"
            sleep 10
          done
          echo "Production services were not ready in time"
          exit 1

      - name: Run production smoke
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.FRONTEND_URL }}
        run: npm run smoke
